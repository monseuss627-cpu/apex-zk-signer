version: '3.8'

services:
  apex-signer:
    build: .
    ports:
      - "8099:8099"
    environment:
      - SIGNER_SECRET=${SIGNER_SECRET:-vertbacon-signer-key-change-me}
      - APEX_API_BASE=https://pro.apex.exchange
      - PORT=8099
    restart: unless-stopped
    # Optional: Increase healthcheck reliability
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8099/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s