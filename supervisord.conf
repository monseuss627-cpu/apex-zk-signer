[supervisord]
nodaemon=true
logfile=/tmp/supervisord.log
pidfile=/tmp/supervisord.pid

[program:signer]
command=python signer_service.py
directory=/app
autostart=true
autorestart=true
stderr_logfile=/tmp/signer_err.log
stdout_logfile=/tmp/signer_out.log

[program:trading]
command=python silverveil_trading.py
directory=/app
autostart=true
autorestart=true
stderr_logfile=/tmp/trading_err.log
stdout_logfile=/tmp/trading_out.log